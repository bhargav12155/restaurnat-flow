<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Demo Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 40px;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: fadeInUp 2s ease-out;
        }
        
        .tagline {
            font-size: 24px;
            margin-bottom: 30px;
            animation: fadeInUp 2s ease-out 0.5s both;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            animation: slideIn 1s ease-out var(--delay) both;
        }
        
        .feature:nth-child(1) { --delay: 1s; }
        .feature:nth-child(2) { --delay: 1.2s; }
        .feature:nth-child(3) { --delay: 1.4s; }
        .feature:nth-child(4) { --delay: 1.6s; }
        
        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .cta {
            margin-top: 40px;
            padding: 15px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 2s infinite 3s;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .floating {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        .floating:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .floating:nth-child(2) {
            top: 60%;
            left: 80%;
            animation-delay: 2s;
        }
        
        .floating:nth-child(3) {
            top: 80%;
            left: 20%;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>
<body>
    <div class="floating"></div>
    <div class="floating"></div>
    <div class="floating"></div>
    
    <div class="container">
        <div class="logo">🏠 Real Estate AI Dashboard</div>
        <div class="tagline">Revolutionizing Real Estate Marketing</div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <h3>AI Content</h3>
                <p>Generate engaging posts in seconds</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <h3>Social Media</h3>
                <p>Post to all platforms simultaneously</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🎥</div>
                <h3>Video Upload</h3>
                <p>Direct YouTube integration</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <h3>SEO Analytics</h3>
                <p>Track performance & rankings</p>
            </div>
        </div>
        
        <button class="cta">Get Started Today</button>
    </div>
    
    <script>
        // Auto-refresh after 10 seconds to loop the animation
        setTimeout(() => {
            window.location.reload();
        }, 10000);
    </script>
</body>
</html>
